<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<title>Redirecting...</title>
<script>
  (function () {
    var l = window.location;
    var base = '/marui-ranger-app';
    var path = l.pathname;
    if (path.indexOf(base) === 0) path = path.slice(base.length);
    var redirect = path + l.search + l.hash;
    // sessionStorage に元URLを入れて、index 側で復元する（URLは一時的に / になる）
    try { sessionStorage.setItem('__spa_redirect__', redirect); } catch (e) {}
    l.replace(base + '/');
  })();
</script>
<link rel="manifest" href="/marui-ranger-app/manifest.webmanifest"/>
<meta name="theme-color" content="#1E3A5F"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="レンジャー"/>
<link rel="apple-touch-icon" href="/marui-ranger-app/icon-192.png"/>
<style>
  #ranger-splash {
    position: fixed; inset: 0; z-index: 99999;
    background: #05162B;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.45s ease-out;
    animation: splashFadeIn 0.3s ease-out;
  }
  #ranger-splash.fading { opacity: 0; pointer-events: none; }
  #ranger-splash .logo-wrap {
    width: 128px; height: 128px;
    border-radius: 30px;
    padding: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(201,168,118,0.35);
    box-shadow: 0 0 48px rgba(201,168,118,0.4);
    animation: splashPulse 2.2s ease-in-out infinite;
    display: flex; align-items: center; justify-content: center;
  }
  #ranger-splash .logo-wrap img {
    width: 100%; height: 100%; border-radius: 22px; display: block;
  }
  @keyframes splashFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes splashPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(201,168,118,0.3); }
    50%      { transform: scale(1.06); box-shadow: 0 0 60px rgba(201,168,118,0.55); }
  }
</style>
<script>
  (function () {
    try {
      var r = sessionStorage.getItem('__spa_redirect__');
      if (r) {
        sessionStorage.removeItem('__spa_redirect__');
        if (r && r !== '/' && r !== '') history.replaceState(null, '', '/marui-ranger-app' + r);
      }
    } catch (e) {}
  })();
</script>
</head>
<body><div id="ranger-splash">
  <div class="logo-wrap">
    <img src="/marui-ranger-app/icon-512.png" alt="RANGER"/>
  </div>
</div>
<script>
  (function () {
    var MIN_SHOW_MS = 1400;
    var start = Date.now();
    function hide() {
      var elapsed = Date.now() - start;
      var wait = Math.max(0, MIN_SHOW_MS - elapsed);
      setTimeout(function () {
        var el = document.getElementById('ranger-splash');
        if (!el) return;
        el.classList.add('fading');
        setTimeout(function () { if (el && el.parentNode) el.parentNode.removeChild(el); }, 550);
      }, wait);
    }
    if (document.readyState === 'complete') {
      hide();
    } else {
      window.addEventListener('load', function () { setTimeout(hide, 200); });
    }
  })();
</script>
</body>
</html>
